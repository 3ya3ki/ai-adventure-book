<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ハルシネーション体験ゲーム</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- Tailwind CSS CDN -->

  <link rel="stylesheet" href="css/portal.css" />

  <script src="js/errorHandler.js" defer></script>
  <script src="js/resultCard.js" defer></script>
  <script src="js/portal.js" defer></script>
  <script src="js/trial.js" defer></script>
